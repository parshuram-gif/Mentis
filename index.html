<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#14181f" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<title>Mentis</title>
<link rel="icon" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Lora', Georgia, serif;
    background: #14181f;
    color: #E4E7EC;
    min-height: 100vh;
    padding: clamp(16px, 4vw, 40px);
    transition: background 0.3s ease;
  }
  body.dark { background: #0D1015; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  button, select, input { font-family: 'IBM Plex Mono', monospace; }
  button { cursor: pointer; }
  button:focus-visible, select:focus-visible, input:focus-visible { outline: 2px solid #B08D57; outline-offset: 2px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
  .brand { color: #B08D57; font-size: 11px; letter-spacing: 3px; margin-bottom: 4px; }
  body.dark .brand { color: #C9A366; }
  .date { color: #8891A0; font-size: 12px; }
  .headerRight { display: flex; gap: 8px; align-items: center; }
  .pill { border: 1px solid #8891A055; border-radius: 20px; padding: 6px 12px; color: #C7CEDA; font-size: 12px; background: transparent; }
  .streak { color: #B08D57; border: 1px solid #B08D5755; border-radius: 20px; padding: 4px 10px; font-size: 12px; }
  .card { background: #F1EBDD; color: #211C14; border-radius: 6px; padding: clamp(20px, 5vw, 36px); box-shadow: 0 20px 40px rgba(0,0,0,0.35); animation: fadeIn 0.4s ease; }
  body.dark .card { background: #1B1712; color: #EDE3D0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .card { animation: none; } }
  .eyebrow { font-size: 11px; letter-spacing: 2px; color: #6B6252; margin-bottom: 14px; }
  body.dark .eyebrow { color: #B8AA8E; }
  select.catSelect { width: 100%; padding: 10px 12px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #6B625255; background: transparent; color: inherit; font-size: 13px; }
  .btnPrimary { width: 100%; padding: 13px 16px; background: #B08D57; border: none; border-radius: 4px; color: #14181f; font-size: 13px; font-weight: 600; letter-spacing: 1px; }
  body.dark .btnPrimary { background: #C9A366; }
  .btnPrimary:disabled { opacity: 0.6; }
  .errorMsg { color: #C25C4B; font-size: 12px; margin-top: 12px; }
  .articleRow { display: flex; border-radius: 6px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.35); }
  .tab { width: 8px; flex-shrink: 0; }
  .articleBody { padding: clamp(20px, 5vw, 36px); flex: 1; }
  .catLabel { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
  .headline { font-size: clamp(22px, 5vw, 28px); line-height: 1.25; margin: 14px 0; font-weight: 600; }
  .basics { font-size: 13px; color: #6B6252; font-style: italic; margin-bottom: 18px; }
  body.dark .basics { color: #B8AA8E; }
  .modeRow { display: flex; gap: 6px; margin-bottom: 18px; }
  .modeBtn { padding: 6px 14px; border-radius: 20px; border: 1px solid #6B625266; background: transparent; color: #6B6252; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  body.dark .modeBtn { color: #B8AA8E; border-color: #B8AA8E66; }
  .modeBtn.active { background: #211C14; color: #F1EBDD; }
  body.dark .modeBtn.active { background: #EDE3D0; color: #1B1712; }
  .content { font-size: 15px; line-height: 1.75; white-space: pre-wrap; margin-bottom: 20px; }
  .takeaway { border-top: 1px solid #6B625233; padding-top: 16px; font-size: 13px; color: #6B6252; margin-bottom: 22px; }
  body.dark .takeaway { color: #B8AA8E; border-color: #B8AA8E33; }
  .takeawayLabel { margin-right: 8px; font-weight: 600; }
  .archiveToggle { background: transparent; border: none; color: #8891A0; font-size: 12px; letter-spacing: 1px; padding: 0; margin-top: 24px; }
  .archiveList { margin-top: 14px; display: flex; flex-direction: column; gap: 1px; }
  .archiveItem { background: #1B1F28; padding: 12px 16px; border-left: 3px solid #B08D57; }
  .archiveTop { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .archiveCat { font-size: 10px; letter-spacing: 1px; }
  .archiveDate { font-size: 10px; color: #5A6270; }
  .archiveHeadline { color: #E4E7EC; font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .archiveSummary { color: #9AA2AF; font-size: 12.5px; line-height: 1.5; }
  .empty { color: #8891A0; font-size: 12px; }
  .loading { color: #8891A0; font-size: 13px; }

  /* Settings modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10; }
  .modal { background: #F1EBDD; color: #211C14; border-radius: 6px; padding: 28px; max-width: 420px; width: 100%; }
  body.dark .modal { background: #1B1712; color: #EDE3D0; }
  .modal h2 { font-size: 18px; margin-bottom: 10px; }
  .modal p { font-size: 13px; line-height: 1.6; color: #6B6252; margin-bottom: 16px; }
  body.dark .modal p { color: #B8AA8E; }
  .modal a { color: #B08D57; }
  .modal input { width: 100%; padding: 10px 12px; border-radius: 4px; border: 1px solid #6B625255; background: transparent; color: inherit; font-size: 13px; margin-bottom: 14px; }
  .modalBtns { display: flex; gap: 10px; }
  .btnGhost { flex: 1; padding: 10px; background: transparent; border: 1px solid #6B625255; border-radius: 4px; color: inherit; font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="brand mono">M E N T I S</div>
      <div class="date mono" id="dateLabel"></div>
    </div>
    <div class="headerRight">
      <div class="streak mono" id="streakPill" style="display:none;"></div>
      <button class="pill" id="settingsBtn" title="API key settings">⚙</button>
      <button class="pill" id="themeBtn">☀ Light</button>
    </div>
  </div>

  <div id="mainArea"><div class="loading mono">Loading…</div></div>

  <div>
    <button class="archiveToggle mono" id="archiveToggle">▸ ARCHIVE (0)</button>
    <div class="archiveList" id="archiveList" style="display:none;"></div>
  </div>
</div>

<div class="overlay" id="settingsOverlay" style="display:none;">
  <div class="modal">
    <h2>Gemini API Key</h2>
    <p>Mentis needs a free Google Gemini key to generate your daily read. Get one at
      <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a>
      (just needs a Google login, no card). It's stored only on this device.</p>
    <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API key" />
    <div class="modalBtns">
      <button class="btnGhost mono" id="cancelSettings">Cancel</button>
      <button class="btnPrimary" id="saveSettings" style="flex:1;">Save</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = [
  { key: "finance", label: "CA & Finance", weight: 55, color: "#4B6455" },
  { key: "geopolitics", label: "Geopolitics", weight: 10, color: "#A44A3F" },
  { key: "worldevents", label: "World Events", weight: 5, color: "#5B6B7C" },
  { key: "entertainment", label: "Entertainment", weight: 5, color: "#7A5480" },
  { key: "books", label: "Books & Quotes", weight: 10, color: "#B08D3F" },
  { key: "music", label: "Music", weight: 5, color: "#3F7A78" },
  { key: "wildcard", label: "Wildcard", weight: 10, color: "#6B5B7A" },
];
const catByKey = k => CATEGORIES.find(c => c.key === k) || CATEGORIES[0];
function pickWeighted(list) {
  const total = list.reduce((s,c)=>s+c.weight,0);
  let r = Math.random()*total;
  for (const c of list) { if (r < c.weight) return c; r -= c.weight; }
  return list[list.length-1];
}
function todayStr() { return new Date().toISOString().slice(0,10); }
function prettyDate(d) {
  return new Date(d+"T00:00:00").toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}

// ---- storage (localStorage, this is a standalone page so it's fine here) ----
const load = (k, fallback) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; } catch { return fallback; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

let state = {
  theme: load("mentis-theme", "light"),
  archive: load("mentis-archive", []),
  streak: load("mentis-streak", { count: 0, lastReadDate: null }),
  history: load("mentis-history", []),
  apiKey: load("mentis-apikey", ""),
  categoryChoice: "random",
  viewMode: "summary",
};

const today = todayStr();
document.getElementById("dateLabel").textContent = prettyDate(today);

function applyTheme() {
  document.body.classList.toggle("dark", state.theme === "dark");
  document.getElementById("themeBtn").textContent = state.theme === "dark" ? "☾ Dark" : "☀ Light";
}
applyTheme();

document.getElementById("themeBtn").onclick = () => {
  state.theme = state.theme === "light" ? "dark" : "light";
  save("mentis-theme", state.theme);
  applyTheme();
};

function renderStreak() {
  const pill = document.getElementById("streakPill");
  if (state.streak.count > 0) { pill.style.display = "inline-block"; pill.textContent = `🔥 ${state.streak.count}d`; }
  else pill.style.display = "none";
}
renderStreak();

function renderArchive() {
  const toggleBtn = document.getElementById("archiveToggle");
  toggleBtn.textContent = `${document.getElementById("archiveList").style.display === "block" ? "▾" : "▸"} ARCHIVE (${state.archive.length})`;
  const list = document.getElementById("archiveList");
  if (state.archive.length === 0) { list.innerHTML = '<div class="empty mono">Nothing yet — today\'s card will start the archive.</div>'; return; }
  list.innerHTML = state.archive.map(a => {
    const c = catByKey(a.category);
    return `<div class="archiveItem" style="border-left-color:${c.color}">
      <div class="archiveTop">
        <span class="archiveCat mono" style="color:${c.color}">${c.label.toUpperCase()}</span>
        <span class="archiveDate mono">${a.date}</span>
      </div>
      <div class="archiveHeadline">${a.headline}</div>
      <div class="archiveSummary">${a.summary}</div>
    </div>`;
  }).join("");
}
renderArchive();

document.getElementById("archiveToggle").onclick = () => {
  const list = document.getElementById("archiveList");
  list.style.display = list.style.display === "block" ? "none" : "block";
  renderArchive();
};

// ---- settings modal ----
const overlay = document.getElementById("settingsOverlay");
document.getElementById("settingsBtn").onclick = () => {
  document.getElementById("apiKeyInput").value = state.apiKey;
  overlay.style.display = "flex";
};
document.getElementById("cancelSettings").onclick = () => overlay.style.display = "none";
document.getElementById("saveSettings").onclick = () => {
  state.apiKey = document.getElementById("apiKeyInput").value.trim();
  save("mentis-apikey", state.apiKey);
  overlay.style.display = "none";
  render();
};

// ---- generation ----
async function generateArticle(category) {
  const prompt = `You are Mentis, a personal daily curator for a Class 11 Maharashtra commerce student who is also pursuing Chartered Accountancy studies in India. Generate one concise, high-quality daily read for the category "${category.label}".
Respond with ONLY valid JSON, no markdown fences, no preamble, in exactly this shape:
{"headline": "string, under 12 words, punchy", "basics": "one short plain-language sentence on what this is and why it matters", "summary": "3-4 sentences covering the core content", "takeaway": "one sentence: the single thing to remember or apply", "full": "300-450 words, detailed version with depth, nuance, and a concrete example"}
Avoid repeating any of these recent topics: ${state.history.slice(-25).join(" | ") || "none yet"}.
Keep tone sharp, useful, and free of filler.
Generate today's read for ${new Date().toDateString()}.`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.apiKey}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
  });
  const data = await res.json();
  let raw;
  try { raw = data.candidates[0].content.parts[0].text; }
  catch { throw new Error(data?.error?.message || "Unexpected response from Gemini."); }
  raw = raw.trim().replace(/^```json/, "").replace(/^```/, "").replace(/```$/, "").trim();
  return JSON.parse(raw);
}

function getTodayArticle() { return load(`mentis-article-${today}`, null); }
function setTodayArticle(entry) { save(`mentis-article-${today}`, entry); }

async function handleGenerate() {
  if (!state.apiKey) { overlay.style.display = "flex"; return; }
  const main = document.getElementById("mainArea");
  const btn = document.getElementById("genBtn");
  if (btn) { btn.disabled = true; btn.textContent = "PULLING TODAY'S CARD…"; }
  try {
    const cat = state.categoryChoice !== "random" ? catByKey(state.categoryChoice) : pickWeighted(CATEGORIES);
    const parsed = await generateArticle(cat);
    const entry = { date: today, category: cat.key, read: false, ...parsed };
    setTodayArticle(entry);
    state.archive.unshift({ date: today, category: cat.key, headline: parsed.headline, summary: parsed.summary });
    save("mentis-archive", state.archive);
    state.history.push(parsed.headline);
    if (state.history.length > 40) state.history = state.history.slice(-40);
    save("mentis-history", state.history);
    render();
  } catch (e) {
    main.querySelector(".errorMsg")?.remove();
    const err = document.createElement("div");
    err.className = "errorMsg mono";
    err.textContent = "Couldn't generate today's read: " + e.message;
    main.appendChild(err);
    if (btn) { btn.disabled = false; btn.textContent = "BEGIN TODAY'S READ"; }
  }
}

function markRead() {
  const entry = getTodayArticle();
  if (!entry || entry.read) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (state.streak.lastReadDate === yesterday) state.streak.count += 1;
  else if (state.streak.lastReadDate !== today) state.streak.count = 1;
  state.streak.lastReadDate = today;
  save("mentis-streak", state.streak);
  entry.read = true;
  setTodayArticle(entry);
  renderStreak();
  render();
}

function render() {
  const main = document.getElementById("mainArea");
  const entry = getTodayArticle();

  if (!entry) {
    main.innerHTML = `
      <div class="card">
        <div class="eyebrow mono">TODAY'S CARD IS EMPTY</div>
        <p style="font-size:15px;line-height:1.6;margin-bottom:20px;">Pick a focus, or leave it to chance — Mentis pulls one read a day, weighted toward CA & finance.</p>
        <label class="mono" style="display:block;font-size:11px;color:#6B6252;margin-bottom:6px;">CATEGORY</label>
        <select class="catSelect" id="catSelect">
          <option value="random">Random (weighted)</option>
          ${CATEGORIES.map(c => `<option value="${c.key}">${c.label}</option>`).join("")}
        </select>
        <button class="btnPrimary" id="genBtn">BEGIN TODAY'S READ</button>
      </div>`;
    document.getElementById("catSelect").onchange = e => state.categoryChoice = e.target.value;
    document.getElementById("genBtn").onclick = handleGenerate;
    return;
  }

  const cat = catByKey(entry.category);
  main.innerHTML = `
    <div class="articleRow">
      <div class="tab" style="background:${cat.color}"></div>
      <div class="articleBody">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="catLabel mono" style="color:${cat.color}">${cat.label}</span>
          ${entry.read ? '<span class="mono" style="font-size:11px;color:#6B6252;">✓ read</span>' : ''}
        </div>
        <h1 class="headline">${entry.headline}</h1>
        <p class="basics">${entry.basics}</p>
        <div class="modeRow">
          <button class="modeBtn ${state.viewMode==='summary'?'active':''}" data-mode="summary">Summary</button>
          <button class="modeBtn ${state.viewMode==='full'?'active':''}" data-mode="full">Full detail</button>
        </div>
        <div class="content">${state.viewMode === 'summary' ? entry.summary : entry.full}</div>
        <div class="takeaway"><span class="takeawayLabel mono" style="color:${cat.color}">TAKEAWAY</span>${entry.takeaway}</div>
        ${!entry.read ? '<button class="btnPrimary" id="readBtn">MARK AS READ</button>' : ''}
      </div>
    </div>`;
  main.querySelectorAll(".modeBtn").forEach(b => b.onclick = () => { state.viewMode = b.dataset.mode; render(); });
  const readBtn = document.getElementById("readBtn");
  if (readBtn) readBtn.onclick = markRead;
}

render();
if (!state.apiKey) overlay.style.display = "flex";
</script>
</body>
</html>
